name: Feature / Implementation
about: Implement a scoped M0-M8 item
title: "[M?-??] "
labels: ["implementation"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What observable result should this issue produce?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Include explicit in-scope and out-of-scope items.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Prefer executable tests or visible demo gates.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Architecture / product references
      description: Cite the relevant section or ADR.
